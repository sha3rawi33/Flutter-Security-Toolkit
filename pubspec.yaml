name: flutter_security_toolkit
description: "A Mobile Security Toolkit providing easy API to check device status (Root, Hooks, Simulator, etc)"
version: 1.0.2
homepage: https://github.com/EXXETA/Flutter-Security-Toolkit

environment:
  sdk: '>=3.4.3 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  pigeon: ^26.0.1

flutter:
  plugin:
    platforms:
      android:
        package: com.exxeta.security_toolkit
        pluginClass: ThreatCenterApiImpl
      ios:
        pluginClass: ThreatCenterApiImpl
